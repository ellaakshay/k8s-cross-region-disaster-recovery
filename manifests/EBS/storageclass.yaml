apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-sc
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  fsType: ext4
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
# WaitForFirstConsumer: EBS volume only created when pod mounts it
# Retain: EBS volume persists even after PVC is deleted

apiVersion: v1
kind: Pod
metadata:
  name: data-writer
  namespace: test-app
spec:
  containers:
  - name: writer
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo '=== VeleroShield DR Test Data ===' > /data/testfile.txt
      echo 'Written by: primary-master'       >> /data/testfile.txt
      echo "Timestamp: $(date)"               >> /data/testfile.txt
      echo 'Region: us-east-1'                >> /data/testfile.txt
      echo 'PVC: demo-pvc (EBS gp3)'          >> /data/testfile.txt
      echo 'Backup: Velero + EBS Snapshot'    >> /data/testfile.txt
      cat /data/testfile.txt
      echo 'Data written! Sleeping...'
      sleep 3600
    volumeMounts:
    - name: demo-storage
      mountPath: /data
  volumes:
  - name: demo-storage
    persistentVolumeClaim:
      claimName: demo-pvc
# Data Written to EBS (confirmed via kubectl exec):
#   === VeleroShield DR Test Data ===
#   Written by: primary-master
#   Timestamp: Sun Apr  5 12:13:07 UTC 2026
#   Region: us-east-1
#   PVC: demo-pvc (EBS gp3)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: test-app
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: '64Mi'
            cpu: '50m'
          limits:
            memory: '128Mi'
            cpu: '100m'

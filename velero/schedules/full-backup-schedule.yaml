apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: full-cluster-backup
  namespace: velero
spec:
  schedule: '0 2 * * *'           # Daily at 02:00 UTC
  template:
    includedNamespaces:
    - '*'                           # All namespaces
    includedResources:
    - '*'                           # All resource types
    includeClusterResources: true   # CRDs, ClusterRoles, etc.
    storageLocation: default
    volumeSnapshotLocations:
    - default
    ttl: 168h0m0s                   # Retain 7 days
    labels:
      backup-type: scheduled
      schedule: full-cluster-backup
